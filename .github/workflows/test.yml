name: ARK Genesis Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Show make targets
        run: make -n validate-deployment || true

      - name: Compile
        run: make compile

      - name: Test
        run: make test

      - name: Validate deployment contracts
        run: python scripts/validate_deployment_manifest.py

      - name: Smoke runtime contract
        run: python scripts/smoke_check_runtime_contract.py
