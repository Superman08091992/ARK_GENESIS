name: ARK Genesis Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Show checked-out commit and dispatcher
        run: |
          git rev-parse HEAD
          python -m scripts --help
          make -n validate-deployment || true

      - name: Compile
        run: make compile

      - name: Test
        run: make test

      - name: Validate deployment contracts
        run: python -m scripts validate-deployment

      - name: Smoke runtime contract
        run: python -m scripts smoke-contract
